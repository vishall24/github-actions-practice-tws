name: Matrix Build

on:
  push:


jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.11, 3.12, 3.13]
        exclude:
          - os: windows-latest
            python-version: 3.11

    steps:
      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
     
      - name: Fail step
        run: exit 1
     
      - name: Print python version
        run: python --version