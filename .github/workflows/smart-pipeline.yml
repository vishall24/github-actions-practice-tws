name: Smart Pipeline

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Linting code
        
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running tests"

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
        - name: branch type
          run: |
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
               echo "Main branch push"

            else
               echo "Feature branch pushed"
            fi

        - name: Commit message
          run: |
            echo "${{ github.event.commits[0].message }}"