name: Deploy

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check result
        if: github.event.workflow_run.conclusion == 'success'
        run: echo "Deploying..."

      - name: Failed case
        if: github.event.workflow_run.conclusion != 'success'
        run: echo "Tests failed, not deploying"