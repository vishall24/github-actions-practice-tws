name: Env vars

on: 
    push:


env:
    APP_NAME: myapp


jobs:
    env-jobs:
        runs-on: ubuntu-latest

        env: 
            ENVIRONMENT: staging
        
        steps:
            - name: Print all Vars
              env:
                VERSION: 1.0.0
              run: |
                echo "App : $APP_NAME"
                echo "Env : $ENVIRONMENT"
                echo "Version: $VERSION"

            - name: GITHUB context
              run: |
                echo "Commit : ${{ github.sha }}"
                echo "Triggered by ${{ github.actor }}"